services:
  campuslands-package:
    build:
      context: .
      dockerfile: Dockerfile.package
      args:
        REPOSITORY_NAME: campuslands-dev-nosql-mongodb
        REPOSITORY_URL: https://github.com/anndreloopez012/campuslands-dev-nosql-mongodb
    image: ghcr.io/anndreloopez012/campuslands-dev-nosql-mongodb:local
    container_name: campuslands-dev-nosql-mongodb-docs
    ports:
      - "${DOCS_PORT:-8080}:80"
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: campuslands-dev-nosql-mongodb-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-campus_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-campus_admin_123}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-campuslands}
      MONGO_APP_DATABASE: ${MONGO_APP_DATABASE:-campuslands}
      MONGO_APP_USERNAME: ${MONGO_APP_USERNAME:-campus_student}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD:-campus_student_123}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
      - ./docker/mongodb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: campuslands-dev-nosql-mongodb-mongo-express
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME:-campus_admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-campus_admin_123}
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH: "true"
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME:-campus}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-campus_123}
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"

volumes:
  mongo_data:
